%YAML 1.2
---
$id: http://devicetree.org/schemas/net/pse-pd/hasivo,hs104.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Hasivo HS104 Power Sourcing Equipment controller

maintainers:
  - Bevan Weiss <bevan.weiss@gmail.com>

description: |
  The HS104PTI/HS104PBI are single-chip PoE PSE controllers managing 4
  delivery channels, allowing them to supply 4 ports of 802.3af/at/bt power.
  The HS104PTI can have 1x 802.3bt port and 3x 802.3at ports.
  The HS104PBI can have 4x 802.3bt ports.

allOf:
  - $ref: pse-controller.yaml#

properties:
  compatible:
    enum:
      - hasivo,hs104
      - hasivo,hs104pti
      - hasivo,hs104pbi

  reg:
    maxItems: 1

  '#pse-cells':
    const: 1

unevaluatedProperties: false

required:
  - compatible
  - reg
  - '#pse-cells'

examples:
  - |
    i2c {
      #address-cells = <1>;
      #size-cells = <0>;

      ethernet-pse@d {
        compatible = "hasivo,hs104";
        reg = <0x0d>;
        #pse-cells = <1>;
      };
    };
