%YAML 1.2
---
$id: http://devicetree.org/schemas/net/pse-pd/realtek,rtl823x.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: MCU front-end for Realtek PoE PSE chips

maintainers:
  - Jonas Jelonek <jelonek.jonas@gmail.com>

description:
  Microcontroller (MCU) that fronts the PoE PSE hardware on Realtek-family
  PoE switches. The MCU exposes a small message-based protocol over either
  I2C/SMBus or UART; the actual PSE silicon is not accessed directly.

  The compatible identifies the PSE chip family managed by the MCU, not
  the MCU silicon itself (which varies across boards and is incidental
  to the protocol).

properties:
  compatible:
    enum:
      - realtek,rtl8238b
      - realtek,rtl8239
      - realtek,rtl8239c

  reg:
    maxItems: 1

  current-speed: true

  power-supply:
    description: Regulator supplying the PoE power rail.

  enable-gpios:
    maxItems: 1

  '#pse-cells':
    const: 1

  pse-pis:
    patternProperties:
      "^pse-pi@[0-9a-f]+$":
        properties:
          max-power-milliwatt:
            description: Per-port maximum power, capped by the chip family.

  realtek,i2c-protocol:
    $ref: /schemas/types.yaml#/definitions/string
    enum: [ i2c, smbus ]
    description: |
      Wire framing the MCU firmware expects on the I2C bus. "smbus" means
      reads carry a leading command byte (0x00) and a repeated start;
      "i2c" means bare 12-byte writes and reads with no command prefix.
      Required for the I2C attachment; not applicable to the UART one.

required:
  - compatible

allOf:
  - $ref: pse-controller.yaml#
  - if:
      required: [reg]
    then:
      required: [realtek,i2c-protocol]
    else:
      properties:
        realtek,i2c-protocol: false
  - if:
      properties:
        compatible:
          contains:
            const: realtek,rtl8238b
    then:
      properties:
        pse-pis:
          patternProperties:
            "^pse-pi@[0-9a-f]+$":
              properties:
                max-power-milliwatt:
                  maximum: 30000
  - if:
      properties:
        compatible:
          contains:
            enum:
              - realtek,rtl8239
              - realtek,rtl8239c
    then:
      properties:
        pse-pis:
          patternProperties:
            "^pse-pi@[0-9a-f]+$":
              properties:
                max-power-milliwatt:
                  maximum: 90000

unevaluatedProperties: false

examples:
  - |
    i2c {
        #address-cells = <1>;
        #size-cells = <0>;

        ethernet-pse@20 {
            compatible = "realtek,rtl8239";
            reg = <0x20>;
            #pse-cells = <1>;
            realtek,i2c-protocol = "smbus";

            pse-pis {
                #address-cells = <1>;
                #size-cells = <0>;

                pse-pi@0 {
                    reg = <0>;
                    #pse-cells = <0>;
                    max-power-milliwatt = <60000>;
                };
            };
        };
    };

  - |
    serial {
        ethernet-pse {
            compatible = "realtek,rtl8239c";
            current-speed = <115200>;
            #pse-cells = <1>;
        };
    };
