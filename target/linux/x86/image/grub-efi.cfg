@SERIAL_CONFIG@
@TERMINAL_CONFIG@

set default="0"
set timeout="@TIMEOUT@"
search -l kernel -s root

menuentry "@TITLE@" {
	if [ -s /boot/intel-ucode.img ] || [ -s /boot/amd-ucode.img ]; then
		linux /boot/vmlinuz @GPT_ROOTPART@ @CMDLINE@
		[ -s /boot/intel-ucode.img ] && initrd /boot/intel-ucode.img
		[ -s /boot/amd-ucode.img ] && initrd /boot/amd-ucode.img
	else
		linux /boot/vmlinuz @GPT_ROOTPART@ @CMDLINE@ noinitrd
	fi

}
menuentry "@TITLE@ (failsafe)" {
	linux /boot/vmlinuz failsafe=true @GPT_ROOTPART@ @CMDLINE@ noinitrd
}
